<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no,maximum-scale=1.0">
<title>腾讯退税通</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Helvetica Neue","Microsoft YaHei",sans-serif;
  background:#EDEDED;
  max-width:414px;
  margin:0 auto;
  height:100%;
  display:flex;
  flex-direction:column;
}

/* ===== 顶部状态栏 ===== */
.statusbar{
  background:#07C160;height:44px;display:flex;align-items:center;
  justify-content:space-between;padding:0 16px;flex-shrink:0;
}
.sb-time{color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px}
.sb-right{display:flex;align-items:center;gap:6px}
.sb-right svg{display:block}
.sb-batt{display:flex;align-items:center;gap:2px}
.sb-batt-num{color:#fff;font-size:12px;font-weight:700}
.batt-shell{width:22px;height:11px;border:1.5px solid #fff;border-radius:2.5px;position:relative;display:flex;align-items:center;padding:1.5px}
.batt-shell::after{content:'';position:absolute;right:-3.5px;top:50%;transform:translateY(-50%);width:1.5px;height:4px;background:#fff;border-radius:0 1px 1px 0}
.batt-fill{height:100%;width:73%;background:#fff;border-radius:1px}

/* ===== 导航栏 ===== */
.navbar{
  background:#07C160;height:44px;display:flex;align-items:center;
  justify-content:space-between;padding:0 10px;flex-shrink:0;
}
.nav-back{width:40px;height:44px;display:flex;align-items:center;justify-content:center}
.nav-back svg{width:12px;height:20px}
.nav-title{color:#fff;font-size:17px;font-weight:600;position:absolute;left:50%;transform:translateX(-50%)}
.nav-capsule{
  display:flex;align-items:center;height:32px;
  background:rgba(0,0,0,.15);border-radius:16px;
  border:.5px solid rgba(255,255,255,.25);overflow:hidden;
}
.cap-dots{display:flex;gap:3px;padding:0 12px;align-items:center}
.cap-dots i{width:4px;height:4px;background:#fff;border-radius:50%;display:block}
.cap-line{width:.5px;height:18px;background:rgba(255,255,255,.3)}
.cap-btn{width:38px;height:32px;display:flex;align-items:center;justify-content:center}
.cap-btn svg{width:16px;height:16px}

/* ===== 绿色banner ===== */
.banner{
  background:#07C160;text-align:center;
  padding:10px 0 28px;color:#fff;font-size:16px;
  letter-spacing:.5px;flex-shrink:0;
}

/* ===== 白色卡片 ===== */
.card{
  background:#fff;margin-top:-12px;border-radius:12px 12px 0 0;
  flex:1;display:flex;flex-direction:column;align-items:center;
  padding:0 24px;overflow-y:auto;
}

/* ===== 拼音行 ===== */
.pinyin-row{
  width:100%;display:flex;align-items:center;
  padding:24px 0 4px;gap:2px;
  justify-content:center;
  flex-wrap:wrap;
  flex-shrink:0;
}
.py-item{
  position:relative;cursor:pointer;user-select:none;
  padding:4px 3px;border-radius:4px;
  transition:background .15s;
  display:flex;flex-direction:column;align-items:center;
}
.py-cn{font-size:16px;color:#333;margin-bottom:2px;letter-spacing:1px}
.py-item:active,.py-item.open{background:#f0f0f0}
.py-item .py-text{
  font-size:16px;font-weight:600;color:#000;
  text-transform:uppercase;letter-spacing:.3px;
  white-space:nowrap;
}
.py-item.multi .py-text{
  border-bottom:1.5px dashed #07C160;
  padding-bottom:1px;
}
.py-space{width:6px;flex-shrink:0}

/* ===== 下拉选框 ===== */
.py-dd{
  display:none;position:absolute;top:calc(100% + 4px);left:50%;
  transform:translateX(-50%);background:#fff;border-radius:8px;
  box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:1001;
  min-width:100px;overflow:hidden;
}
.py-dd::before{
  content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  border-left:5px solid transparent;border-right:5px solid transparent;
  border-bottom:5px solid #fff;
}
.py-dd.show{display:block}
.py-dd-title{font-size:11px;color:#999;padding:8px 12px 4px;white-space:nowrap}
.py-dd-opt{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 12px;font-size:14px;color:#333;cursor:pointer;
  transition:background .1s;gap:12px;
}
.py-dd-opt+.py-dd-opt{border-top:.5px solid #f0f0f0}
.py-dd-opt:active{background:#f7f7f7}
.py-dd-opt.sel{color:#07C160;font-weight:600}
.py-dd-opt.sel::after{content:'✓';color:#07C160;font-size:13px;font-weight:700}
.py-dd-opt span{text-transform:uppercase;letter-spacing:.3px}
.overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:1000}
.overlay.show{display:block}

/* ===== 条形码数字 ===== */
.bc-num{
  width:100%;font-size:20px;letter-spacing:2.5px;color:#000;
  font-weight:500;font-family:"Menlo","SF Mono","Courier New",monospace;
  padding:12px 0 8px;flex-shrink:0;
}

/* ===== 条形码 ===== */
.bc-canvas-wrap{width:100%;flex-shrink:0;margin-bottom:28px}
.bc-canvas-wrap canvas{width:100%;height:68px;display:block}

/* ===== 二维码 ===== */
.qr-wrap{
  width:210px;height:210px;position:relative;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;flex-shrink:0;
}
.qr-wrap canvas{width:210px;height:210px}
.qr-avatar{
  position:absolute;width:46px;height:46px;background:#f5f5f5;
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  border:2.5px solid #fff;box-shadow:0 0 6px rgba(0,0,0,.06);
}
.qr-avatar svg{width:28px;height:28px}

/* ===== 底部文字 ===== */
.tip1{font-size:16px;color:#333;margin-bottom:14px;text-align:center;flex-shrink:0}
.tip2{font-size:13px;color:#BBB;text-align:center;margin-bottom:4px;flex-shrink:0}
.tip3{font-size:13px;color:#07C160;text-align:center;margin-bottom:20px;flex-shrink:0}

/* ===== 底部横条 ===== */
.home-bar{
  width:134px;height:5px;background:#000;border-radius:100px;
  margin:auto auto 8px;flex-shrink:0;
}
</style>
</head>
<body>

/* ========== 拼音字典（常用字） ========== */

'赵':'ZHAO','钱':'QIAN','孙':'SUN','李':'LI','周':'ZHOU','吴':'WU','郑':'ZHENG','王':'WANG',
'冯':'FENG','陈':'CHEN','褚':'CHU','卫':'WEI','蒋':'JIANG','沈':'SHEN','韩':'HAN','杨':'YANG',
'张':'ZHANG','孔':'KONG','曹':'CAO','严':'YAN','金':'JIN','魏':'WEI','陶':'TAO','姜':'JIANG',
'谢':'XIE','邹':'ZOU','柏':'BAI','苏':'SU','潘':'PAN','彭':'PENG','鲁':'LU','马':'MA',
'方':'FANG','俞':'YU','任':'REN','袁':'YUAN','柳':'LIU','史':'SHI','唐':'TANG','费':'FEI',
'薛':'XUE','雷':'LEI','贺':'HE','倪':'NI','汤':'TANG','罗':'LUO','毕':'BI','郝':'HAO',

'顾':'GU','孟':'MENG','黄':'HUANG','穆':'MU','萧':'XIAO','尹':'YIN','姚':'YAO','邵':'SHAO',
'汪':'WANG','毛':'MAO','狄':'DI','米':'MI','贝':'BEI','明':'MING','宋':'SONG','熊':'XIONG',
'舒':'SHU','屈':'QU','项':'XIANG','祝':'ZHU','董':'DONG','梁':'LIANG','杜':'DU','阮':'RUAN',
'蓝':'LAN','季':'JI','贾':'JIA','路':'LU','江':'JIANG','童':'TONG','郭':'GUO','梅':'MEI',

'婷':'TING','慧':'HUI','杰':'JIE','伟':'WEI','敏':'MIN','芳':'FANG','丽':'LI','娜':'NA',
'强':'QIANG','磊':'LEI','军':'JUN','洋':'YANG','勇':'YONG','艳':'YAN','涛':'TAO','春':'CHUN',
'飞':'FEI','鹏':'PENG','超':'CHAO','静':'JING','刚':'GANG','平':'PING','建':'JIAN','辉':'HUI',
'志':'ZHI','兴':'XING','良':'LIANG','海':'HAI','岩':'YAN','峰':'FENG','斌':'BIN','翔':'XIANG',
'亮':'LIANG','波':'BO','霞':'XIA','琳':'LIN','玉':'YU','萍':'PING','红':'HONG','德':'DE',
'清':'QING','威':'WEI','彬':'BIN','云':'YUN','秀':'XIU','英':'YING','晓':'XIAO','琴':'QIN',
'蕾':'LEI','昊':'HAO','然':'RAN','琪':'QI','佳':'JIA','妍':'YAN','思':'SI','梦':'MENG',
'怡':'YI','雪':'XUE','晨':'CHEN','露':'LU','紫':'ZI','涵':'HAN','瑶':'YAO','璐':'LU',

'悦':'YUE','桐':'TONG','奕':'YI','心':'XIN','天':'TIAN','新':'XIN','立':'LI','世':'SHI',
'永':'YONG','启':'QI','大':'DA','小':'XIAO','中':'ZHONG','正':'ZHENG','光':'GUANG','学':'XUE',

'牧':'MU','全':'QUAN','班':'BAN','秋':'QIU','仲':'ZHONG','伊':'YI','宫':'GONG',
};

/* ========== 复姓列表 ========== */
const COMPOUND=['欧阳','司马','上官','诸葛','司徒','令狐','慕容','皇甫','尉迟','公孙','长孙','宇文'];

/* ========== 配置：用户姓名 ========== */
const USER_NAME = '曾晓璐';  // ← 原始姓名（用于拼音查询）
const DISPLAY_NAME = '曾**'; // ← 显示姓名（中文脱敏）

/* ========== 工具函数 ========== */
function getSurnameLen(name){
  for(const c of COMPOUND) if(name.startsWith(c)) return c.length;
  return 1;
}
function getOptions(ch){
  if(MULTI[ch]) return MULTI[ch];
  if(PY[ch]) return [PY[ch]];
  return ['?'];
}

/* ========== 状态 ========== */
const chars = [...USER_NAME];
const displayChars = [...DISPLAY_NAME];
const sLen = getSurnameLen(USER_NAME);
const selected = chars.map(()=>0); // 每个字当前选择的拼音索引
let openIdx = -1;

/* ========== 渲染拼音行 ========== */
function render(){
  const row = document.getElementById('pinyinRow');
  row.innerHTML = '';

  chars.forEach((ch, i)=>{
    if(ch==='·'||ch==='•'){
      const sp = document.createElement('span');
      sp.className = 'py-space';
      row.appendChild(sp);
      return;
    }

    const dispCh = displayChars[i] || ch; // 显示用的中文字符（可能是*）

    const opts = getOptions(ch);
    const item = document.createElement('div');
    item.className = 'py-item' + (opts.length>1?' multi':'');
    if(i===openIdx) item.classList.add('open');

    const cn = document.createElement('span');
    cn.className = 'py-cn';
    cn.textContent = dispCh;  // 中文显示脱敏字符
    item.appendChild(cn);

    const txt = document.createElement('span');
    txt.className = 'py-text';
    txt.textContent = opts[selected[i]];  // 拼音正常显示
    item.appendChild(txt);

    // 姓名间加空格
    if(i===sLen-1 && sLen<chars.length){
      item.style.marginRight = '8px';
    }

    // 多音字下拉
    if(opts.length>1){
      const dd = document.createElement('div');
      dd.className = 'py-dd'+(openIdx===i?' show':'');

      const title = document.createElement('div');
      title.className = 'py-dd-title';
      title.textContent = '选择「'+ch+'」的读音';
      dd.appendChild(title);

      opts.forEach((py,pi)=>{
        const opt = document.createElement('div');
        opt.className = 'py-dd-opt'+(pi===selected[i]?' sel':'');
        opt.innerHTML = '<span>'+py+'</span>';
        opt.addEventListener('click', e=>{
          e.stopPropagation();
          selected[i] = pi;
          openIdx = -1;
          render();
        });
        dd.appendChild(opt);
      });
      item.appendChild(dd);

      item.addEventListener('click', e=>{
        e.stopPropagation();
        openIdx = openIdx===i ? -1 : i;
        render();
      });
    }

    row.appendChild(item);
  });

  // 遮罩
  const ov = document.getElementById('overlay');
  if(openIdx>=0){
    ov.className = 'overlay show';
  } else {
    ov.className = 'overlay';
  }
}

document.getElementById('overlay').addEventListener('click',()=>{openIdx=-1;render();});

/* ========== 画条形码 ========== */
function drawBarcode(){
  const c = document.getElementById('bcCanvas');
  const ctx = c.getContext('2d');
  c.width = c.offsetWidth * 2;
  c.height = 136;
  ctx.clearRect(0,0,c.width,c.height);
  let x=4, rng=662508014092;
  while(x<c.width-4){
    rng=(rng*1103515245+12345)&0x7fffffff;
    const w=(rng%4)+1;
    if((rng%3)!==0){ctx.fillStyle='#000';ctx.fillRect(x,0,w,c.height);}
    x+=w+.5;
  }
}

/* ========== 画二维码 ========== */
function drawQR(){
  const c = document.getElementById('qrCanvas');
  const ctx = c.getContext('2d');
  const s=210;c.width=s*2;c.height=s*2;ctx.scale(2,2);
  const m=33,cs=s/m;let rng=123456;
  for(let r=0;r<m;r++)for(let col=0;col<m;col++){
    rng=(rng*1103515245+12345)&0x7fffffff;
    const isFinder=(r<7&&col<7)||(r<7&&col>=m-7)||(r>=m-7&&col<7);
    let fill=false;
    if(isFinder){
      const lr=r<7?r:r-(m-7),lc=col<7?col:col-(m-7);
      fill=lr===0||lr===6||lc===0||lc===6||(lr>=2&&lr<=4&&lc>=2&&lc<=4);
    } else {
      const cr=Math.abs(r-m/2)<4,cc=Math.abs(col-m/2)<4;
      fill=!(cr&&cc)&&(rng%3)!==0;
    }
    if(fill){ctx.fillStyle='#000';ctx.fillRect(col*cs,r*cs,cs,cs);}
  }
}

/* ========== 启动 ========== */
window.addEventListener('load',()=>{
  render();
  setTimeout(drawBarcode,30);
  drawQR();
});
window.addEventListener('resize',()=>setTimeout(drawBarcode,30));
</script>
